<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>v33 · 카드 패닝/플립 후보군 데모</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090C;--bg-card:#0F1119;--bg-elev:#161822;
  --ink:#F1F3F8;--ink-soft:#C5CAD9;--muted:#8B92A8;
  --pink:#EC4899;--purple:#8B5CF6;--cyan:#06B6D4;--gold:#F59E0B;--blue:#2563EB;
  --border:rgba(255,255,255,.08);
  --ease:cubic-bezier(.22,1,.36,1);
  --ease-spring:cubic-bezier(.22,1.2,.36,1);
  --display:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:radial-gradient(ellipse at 30% 0%,rgba(139,92,246,.07),transparent 60%),radial-gradient(ellipse at 70% 100%,rgba(236,72,153,.06),transparent 60%),var(--bg);
  color:var(--ink);
  font-family:var(--display),-apple-system,sans-serif;
  min-height:100vh;
  padding:32px 20px 80px;
  letter-spacing:-.005em;
}

header{max-width:1280px;margin:0 auto 24px}
h1{font-size:24px;font-weight:900;letter-spacing:-.025em;margin:0 0 4px}
h1 em{font-style:normal;background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{font-size:13px;color:var(--muted);margin:0 0 18px;line-height:1.6}

.tabs-row{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:14px}
.tabs{display:flex;flex-wrap:wrap;gap:6px}
.tab{padding:9px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:100px;color:var(--ink-soft);cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:700;letter-spacing:-.005em;transition:all .2s;white-space:nowrap}
.tab:hover{border-color:rgba(139,92,246,.5);color:var(--ink)}
.tab.active{background:linear-gradient(135deg,rgba(6,182,212,.92),rgba(139,92,246,.92));border-color:transparent;color:#fff;box-shadow:0 6px 20px rgba(6,182,212,.32)}
.replay{margin-left:auto;padding:8px 14px;background:transparent;border:1px solid var(--muted);border-radius:100px;color:var(--ink-soft);cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;transition:all .2s}
.replay:hover{border-color:var(--cyan);color:var(--cyan)}

.notes{font-size:12.5px;color:var(--ink-soft);margin:0 0 18px;padding:14px 16px;background:rgba(139,92,246,.06);border-left:3px solid var(--purple);border-radius:0 8px 8px 0;line-height:1.55}
.notes b{color:var(--cyan);font-weight:800}
.notes .pro,.notes .con{display:inline-block;padding:1px 8px;border-radius:4px;font-size:10.5px;font-weight:800;letter-spacing:.06em;margin-right:4px}
.notes .pro{background:rgba(16,185,129,.14);color:#10B981}
.notes .con{background:rgba(236,72,153,.14);color:var(--pink)}

main{max-width:1280px;margin:0 auto}
.stage{position:relative;min-height:520px;background:linear-gradient(180deg,rgba(255,255,255,.015),transparent);border:1px dashed rgba(255,255,255,.06);border-radius:16px;padding:32px 24px;overflow:hidden}

/* === CARD BASE · 3D flip === */
.card{position:relative;width:180px;height:240px;perspective:1400px}
.card-inner{position:absolute;inset:0;transform-style:preserve-3d;transform:rotateY(180deg);will-change:transform}
.card-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,.08)}
.card-back{background:linear-gradient(160deg,#1a1224 0%,#08090C 100%);display:flex;align-items:center;justify-content:center;position:relative}
.card-back::before{content:'';position:absolute;inset:10px;border:1px dashed rgba(236,72,153,.32);border-radius:10px}
.card-back-q{position:absolute;font-family:var(--display);font-size:108px;font-weight:900;color:rgba(255,255,255,.07);line-height:1;top:50%;left:50%;transform:translate(-50%,-50%) translateY(-6px)}
.card-back-mark{position:relative;font-family:var(--mono);font-size:10px;letter-spacing:.4em;color:rgba(236,72,153,.55);font-weight:800;text-transform:uppercase;margin-top:auto;margin-bottom:14px}
.card-front{display:flex;flex-direction:column;padding:16px 14px;background:linear-gradient(160deg,rgba(8,9,12,.85),rgba(8,9,12,.95))}
.card-front.t-pink{background:linear-gradient(160deg,rgba(236,72,153,.2),rgba(8,9,12,.95));border-color:rgba(236,72,153,.4)}
.card-front.t-purple{background:linear-gradient(160deg,rgba(139,92,246,.2),rgba(8,9,12,.95));border-color:rgba(139,92,246,.4)}
.card-front.t-cyan{background:linear-gradient(160deg,rgba(6,182,212,.2),rgba(8,9,12,.95));border-color:rgba(6,182,212,.4)}
.card-front.t-gold{background:linear-gradient(160deg,rgba(245,158,11,.2),rgba(8,9,12,.95));border-color:rgba(245,158,11,.4)}
.card-front.t-blue{background:linear-gradient(160deg,rgba(37,99,235,.2),rgba(8,9,12,.95));border-color:rgba(37,99,235,.4)}
.cf-tag{font-family:var(--mono);font-size:9px;letter-spacing:.24em;font-weight:800;text-transform:uppercase;color:var(--pink);margin-bottom:6px}
.cf-name{font-size:21px;font-weight:900;letter-spacing:-.02em;color:var(--ink);line-height:1;margin-bottom:3px}
.cf-hint{font-size:12px;color:var(--ink-soft);flex:1;line-height:1.45;opacity:.85}
.cf-foot{display:flex;justify-content:space-between;align-items:center;margin-top:auto}
.cf-dday{font-family:var(--mono);font-size:10px;letter-spacing:.08em;font-weight:800;color:var(--cyan);background:rgba(6,182,212,.12);border:1px solid rgba(6,182,212,.32);border-radius:100px;padding:3px 9px}
.cf-lock{color:rgba(255,255,255,.42);font-size:13px}

/* ========================================================================
   MODE A · RIFFLE FAN  ·  8장 카드가 한 더미에서 호로 펼쳐지고 한 장씩 플립
   ======================================================================== */
.mode-riffle .stage-inner{position:relative;width:100%;height:520px}
.mode-riffle .card{position:absolute;left:50%;top:60%;margin-left:-90px;margin-top:-120px;transform:translate(0,0) rotate(0);transition:transform 1s var(--ease) var(--spread-delay,0ms)}
.mode-riffle.active .card{transform:translate(var(--fx,0),var(--fy,0)) rotate(var(--frot,0deg))}
.mode-riffle .card .card-inner{transition:transform .85s var(--ease-spring) var(--flip-delay,0ms)}
.mode-riffle.active .card .card-inner{transform:rotateY(0deg)}

/* ========================================================================
   MODE B · LINEAR STRIP  ·  카드 6장이 일직선 한 줄로 정렬, 좌→우 순서 플립
   ======================================================================== */
.mode-strip .stage-inner{display:flex;justify-content:center;align-items:center;gap:14px;padding:80px 0;flex-wrap:wrap}
.mode-strip .card .card-inner{transition:transform .8s var(--ease-spring) var(--flip-delay,0ms)}
.mode-strip.active .card .card-inner{transform:rotateY(0deg)}

/* ========================================================================
   MODE C · CASCADE WAVE  ·  6×4 그리드 전체가 좌상→우하 대각선 wave로 플립
   ======================================================================== */
.mode-cascade .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
@media(max-width:980px){.mode-cascade .grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:620px){.mode-cascade .grid{grid-template-columns:repeat(3,1fr)}}
.mode-cascade .card{width:100%;height:200px}
.mode-cascade .card .card-inner{transition:transform .85s var(--ease-spring) var(--flip-delay,0ms)}
.mode-cascade.active .card .card-inner{transform:rotateY(0deg)}

/* ========================================================================
   MODE D · CASCADE + RAON LAST  ·  C가 다 끝나고 라온 카드가 위로 솟아 오름
   ======================================================================== */
.mode-featured-last .featured-slot{position:relative;height:240px;border:1px dashed rgba(236,72,153,.18);border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:22px;font-family:var(--mono);font-size:10.5px;letter-spacing:.32em;color:rgba(255,255,255,.16);text-transform:uppercase}
.mode-featured-last .featured-card{position:absolute;left:50%;top:50%;width:min(420px,calc(100% - 32px));height:200px;margin-left:calc(min(420px,100% - 32px) / -2);margin-top:-100px;background:linear-gradient(160deg,rgba(236,72,153,.22),rgba(8,9,12,.92));border:1.5px solid rgba(236,72,153,.55);border-radius:18px;padding:18px 22px 16px;display:flex;flex-direction:column;gap:6px;opacity:0;transform:translate(0,260px) scale(.55) rotate(-6deg);transition:opacity .9s var(--ease),transform 1.1s var(--ease-spring);box-shadow:0 22px 56px rgba(236,72,153,.34);will-change:transform,opacity}
.mode-featured-last.featured-revealed .featured-card{opacity:1;transform:translate(0,0) scale(1) rotate(0)}
.fc-tag{font-family:var(--mono);font-size:9.5px;letter-spacing:.24em;font-weight:800;color:var(--pink);text-transform:uppercase}
.fc-name{font-size:26px;font-weight:900;letter-spacing:-.025em;line-height:1.05}
.fc-name em{font-style:normal;background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.fc-hint{font-size:13px;color:var(--ink-soft);margin-top:2px}
.fc-cta{margin-top:auto;font-size:12.5px;font-weight:800;color:var(--cyan);letter-spacing:-.005em}

.mode-featured-last .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
@media(max-width:980px){.mode-featured-last .grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:620px){.mode-featured-last .grid{grid-template-columns:repeat(3,1fr)}}
.mode-featured-last .card{width:100%;height:170px}
.mode-featured-last .card .card-inner{transition:transform .8s var(--ease-spring) var(--flip-delay,0ms)}
.mode-featured-last.active .card .card-inner{transform:rotateY(0deg)}

/* ========================================================================
   MODE F · MULTI-DECK RIFFLE → 3-DRAW
   3개 덱이 가로로 겹쳐 있음 → 각 덱 안에서 카드들이 한 장씩 스르륵 들춰짐
   → 모든 덱 리플 끝나면 3장(각 덱에서 한 장씩)이 아래 row로 뽑혀나와 안착
   ======================================================================== */
.mode-decks-draw .stage-inner{display:flex;flex-direction:column;align-items:center;gap:38px;padding:8px 0 24px;min-height:580px}
.mode-decks-draw .decks{position:relative;display:flex;justify-content:center;align-items:flex-start;height:300px;transition:opacity .9s var(--ease) 200ms,filter .9s var(--ease) 200ms}
.mode-decks-draw.dimmed .decks{opacity:.42;filter:saturate(.65)}
.mode-decks-draw .deck{position:relative;width:200px;height:280px;margin:0 -50px}
.mode-decks-draw .deck .card{position:absolute;top:0;left:50%;margin-left:-90px;transform:rotate(calc((var(--i) - 2) * 2.6deg));transform-origin:50% 90%;will-change:transform}
.mode-decks-draw.active .deck .card{animation:deck-riffle .68s var(--ease-spring) var(--peek-delay,0ms)}
@keyframes deck-riffle{
  0%   { transform: translateX(0)    translateY(0)    rotate(calc((var(--i) - 2) * 2.6deg))                  scale(1) }
  35%  { transform: translateX(58px) translateY(-22px) rotate(calc((var(--i) - 2) * 2.6deg + 9deg))           scale(1.05) }
  70%  { transform: translateX(20px) translateY(-2px)  rotate(calc((var(--i) - 2) * 2.6deg + 2deg))           scale(1.01) }
  100% { transform: translateX(0)    translateY(0)    rotate(calc((var(--i) - 2) * 2.6deg))                  scale(1) }
}

/* deck label · subtle eyebrow under each */
.mode-decks-draw .deck::after{content:attr(data-label);position:absolute;left:50%;bottom:-26px;transform:translateX(-50%);font-family:var(--mono);font-size:9.5px;letter-spacing:.28em;font-weight:800;text-transform:uppercase;color:rgba(255,255,255,.32);white-space:nowrap}

/* drawn row · 3 cards land here · animate in after riffles */
.mode-decks-draw .drawn-label{font-family:var(--mono);font-size:10px;letter-spacing:.36em;font-weight:800;color:rgba(236,72,153,.7);text-transform:uppercase;opacity:0;transition:opacity .6s var(--ease) 1750ms}
.mode-decks-draw.active .drawn-label{opacity:1}
.mode-decks-draw .drawn-row{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.mode-decks-draw .drawn-row .card{width:170px;height:230px;opacity:0;will-change:transform,opacity}
.mode-decks-draw.active .drawn-row .card{animation:drawn-fly-in .95s var(--ease-spring) var(--draw-delay,0ms) forwards}
@keyframes drawn-fly-in{
  0%   { opacity:0; transform: translate(var(--from-x, 0), -260px) rotate(var(--from-rot, -10deg)) scale(.55) }
  55%  { opacity:1; transform: translate(0, 12px) rotate(2deg) scale(1.05) }
  100% { opacity:1; transform: translate(0, 0) rotate(0) scale(1) }
}
.mode-decks-draw .drawn-row .card .card-inner{transition:transform .85s var(--ease-spring) var(--flip-delay,0ms)}
.mode-decks-draw.active .drawn-row .card .card-inner{transform:rotateY(0deg)}

/* ========================================================================
   MODE E · TAROT 3-REVEAL  ·  3장만 일직선 배치, 1초 간격 묵직한 플립
   ======================================================================== */
.mode-tarot .stage-inner{display:flex;justify-content:center;align-items:center;gap:32px;padding:50px 0;flex-wrap:wrap;min-height:380px}
.mode-tarot .card{width:200px;height:300px}
.mode-tarot .card-back::before{border-color:rgba(245,158,11,.45)}
.mode-tarot .card-back-mark{color:rgba(245,158,11,.7)}
.mode-tarot .card-back-q{color:rgba(245,158,11,.05);font-family:serif}
.mode-tarot .card .card-inner{transition:transform 1.1s var(--ease-spring) var(--flip-delay,0ms)}
.mode-tarot.active .card .card-inner{transform:rotateY(0deg)}

</style>
</head>
<body>

<header>
  <h1>v33 · <em>카드 패닝/플립</em> 후보군</h1>
  <p class="subtitle">탭으로 후보 5종 비교 · ↻ 다시 재생 · 모바일에서도 동작</p>
  <div class="tabs-row">
    <div class="tabs">
      <button class="tab active" data-mode="riffle">A · Riffle Fan</button>
      <button class="tab" data-mode="strip">B · Linear Strip</button>
      <button class="tab" data-mode="decks-draw">F · 다중 덱 → 3장 뽑기</button>
      <button class="tab" data-mode="cascade">C · Cascade Wave</button>
      <button class="tab" data-mode="featured-last">D · Cascade + 라온 등장</button>
      <button class="tab" data-mode="tarot">E · Tarot 3-Reveal</button>
    </div>
    <button class="replay" id="replay">↻ 다시 재생</button>
  </div>
  <div class="notes" id="notes"></div>
</header>

<main>
  <div class="stage" id="stage"></div>
</main>

<script>
const TEASERS = [
  { hint:'다크 아카데미', tone:'purple', dday:3 },
  { hint:'성인 로맨스',   tone:'pink',   dday:6 },
  { hint:'SF · 추격',     tone:'cyan',   dday:6 },
  { hint:'경매 · 스릴러', tone:'pink',   dday:9 },
  { hint:'야미 · 후원생', tone:'gold',   dday:9 },
  { hint:'마피아 정보상', tone:'pink',   dday:9 },
  { hint:'안드로이드 DJ', tone:'cyan',   dday:12 },
  { hint:'전속 재단사',   tone:'purple', dday:12 },
  { hint:'아카이비스트',  tone:'purple', dday:15 },
  { hint:'타투이스트',    tone:'blue',   dday:15 },
  { hint:'피아노 작곡가', tone:'purple', dday:15 },
  { hint:'전 인터폴',     tone:'pink',   dday:18 },
  { hint:'정보 중개자',   tone:'purple', dday:18 },
  { hint:'영화감독·타겟', tone:'blue',   dday:21 },
  { hint:'꿈 수호자',     tone:'blue',   dday:21 },
  { hint:'전 비행단 리더',tone:'blue',   dday:23 },
  { hint:'바리스타',      tone:'gold',   dday:23 },
  { hint:'책방 주인',     tone:'gold',   dday:23 },
  { hint:'위장 형사',     tone:'cyan',   dday:25 },
  { hint:'기억 거래상',   tone:'purple', dday:25 },
  { hint:'고스트 작가',   tone:'pink',   dday:28 },
  { hint:'야간 의사',     tone:'cyan',   dday:28 },
  { hint:'심령술사',      tone:'purple', dday:30 },
  { hint:'사라진 친구',   tone:'pink',   dday:30 },
];

const NOTES = {
  riffle:'<b>A · Riffle Fan</b> — 카드 8장이 더미에서 부채꼴(arc)로 펼쳐진 뒤 좌→우 순서로 한 장씩 뒤집힘. <span class="pro">PRO</span>가장 임팩트 있고 "덱" 메타포 살아있음. <span class="con">CON</span>카드 수 제한 (8~12장 정도) · 60+ 그리드를 별도로 깔아야 함.',
  strip:'<b>B · Linear Strip</b> — 카드 6장이 한 줄(직선) 정렬되고 좌→우 순서로 플립. <span class="pro">PRO</span>가장 명확하고 깔끔, "한 장씩 공개" 메시지가 분명. <span class="con">CON</span>fan보다 시각적 임팩트는 약함, 모바일에서 wrap됨.',
  'decks-draw':'<b>F · 다중 덱 → 3장 뽑기</b> — 3개 덱이 가로로 겹쳐 있고 각 덱 안에서 카드들이 한 장씩 스르륵 들춰지고(translateX+Y peek) 들어감 → 모든 덱이 다 넘어가면 위에서 3장이 차례로 떨어져 row에 안착하면서 플립. <span class="pro">PRO</span>"수많은 카드 중에 3장 뽑힘" 메타포가 가장 직관적, 매주 합류 + 큐레이션 느낌. <span class="con">CON</span>전체 ~3.5s, 데스크탑에서 가장 잘 보임.',
  cascade:'<b>C · Cascade Wave</b> — 6×4(=24) 그리드 전체가 좌상→우하 대각선 wave로 플립. <span class="pro">PRO</span>60+ 카드를 한 화면에 다 담을 수 있는 유일한 옵션. <span class="con">CON</span>전체 시간이 길어짐 (~3.5s) · "라온이 특별하다" 강조가 약함.',
  'featured-last':'<b>D · Cascade + 라온 등장</b> — C 그리드가 다 뒤집힌 직후, 라온 카드가 그리드 아래에서 위로 솟아올라 featured 슬롯에 안착. <span class="pro">PRO</span>"수많은 캐릭터 중 한 명이 라온"이라는 서사 살아있음 + 60+ 다 보임. <span class="con">CON</span>전체 ~4.5s, 가장 김.',
  tarot:'<b>E · Tarot 3-Reveal</b> — 3장만 일직선 큰 사이즈로 배치, 1초 간격 묵직한 플립. <span class="pro">PRO</span>가장 분위기 있음 (오컬트/노블 톤), 주목도 최강. <span class="con">CON</span>3장만 보여줌 · 나머지는 평범한 그리드 별도 필요 · "수많은 카드" 메시지 약함.',
};

function makeCard(t, opts = {}){
  const div = document.createElement('div');
  div.className = 'card';
  if(opts.flipDelay !== undefined) div.style.setProperty('--flip-delay', opts.flipDelay + 'ms');
  if(opts.spreadDelay !== undefined) div.style.setProperty('--spread-delay', opts.spreadDelay + 'ms');
  if(opts.fx !== undefined) div.style.setProperty('--fx', opts.fx + 'px');
  if(opts.fy !== undefined) div.style.setProperty('--fy', opts.fy + 'px');
  if(opts.frot !== undefined) div.style.setProperty('--frot', opts.frot + 'deg');
  div.innerHTML = `
    <div class="card-inner">
      <div class="card-face card-back">
        <div class="card-back-q">?</div>
        <div class="card-back-mark">LUCIVE</div>
      </div>
      <div class="card-face card-front t-${t.tone}">
        <div class="cf-tag">${t.hint}</div>
        <div class="cf-name">???</div>
        <div class="cf-hint">곧 만날 사람</div>
        <div class="cf-foot">
          <span class="cf-dday">D-${t.dday}</span>
          <span class="cf-lock">🔒</span>
        </div>
      </div>
    </div>`;
  return div;
}

const stage = document.getElementById('stage');
const notesEl = document.getElementById('notes');
let currentMode = 'riffle';

function render(mode){
  currentMode = mode;
  notesEl.innerHTML = NOTES[mode] || '';
  stage.className = 'stage mode-' + mode;
  stage.innerHTML = '';

  if(mode === 'riffle'){
    const inner = document.createElement('div');
    inner.className = 'stage-inner';
    const N = 8;
    for(let i = 0; i < N; i++){
      const t = TEASERS[i];
      const angle = (i - (N - 1) / 2) * 11; // -38.5° ~ +38.5°
      const fx = Math.sin(angle * Math.PI / 180) * 320;
      const fy = -Math.abs(Math.sin(angle * Math.PI / 180)) * 50;
      const card = makeCard(t, {
        spreadDelay: i * 65,
        flipDelay: 1100 + i * 130,
        fx, fy, frot: angle,
      });
      inner.appendChild(card);
    }
    stage.appendChild(inner);
    requestAnimationFrame(() => requestAnimationFrame(() => stage.classList.add('active')));
    return;
  }

  if(mode === 'strip'){
    const inner = document.createElement('div');
    inner.className = 'stage-inner';
    const N = 6;
    for(let i = 0; i < N; i++){
      const t = TEASERS[i];
      const card = makeCard(t, { flipDelay: 400 + i * 200 });
      inner.appendChild(card);
    }
    stage.appendChild(inner);
    requestAnimationFrame(() => requestAnimationFrame(() => stage.classList.add('active')));
    return;
  }

  if(mode === 'cascade'){
    const COLS = 6, ROWS = 4;
    const grid = document.createElement('div');
    grid.className = 'grid';
    const stagger = 55, base = 250;
    for(let i = 0; i < COLS * ROWS; i++){
      const t = TEASERS[i % TEASERS.length];
      const row = Math.floor(i / COLS), col = i % COLS;
      const card = makeCard(t, { flipDelay: base + (row + col) * stagger });
      grid.appendChild(card);
    }
    stage.appendChild(grid);
    requestAnimationFrame(() => requestAnimationFrame(() => stage.classList.add('active')));
    return;
  }

  if(mode === 'featured-last'){
    const slot = document.createElement('div');
    slot.className = 'featured-slot';
    slot.textContent = 'FEATURED · LIVE NOW';
    const fc = document.createElement('div');
    fc.className = 'featured-card';
    fc.innerHTML = `
      <div class="fc-tag">▶ EP.1 · 프롤로그</div>
      <div class="fc-name">라온 · <em>RAON</em></div>
      <div class="fc-hint">호위 · 14년차 · 다시 살아간다</div>
      <div class="fc-cta">💬 라온과 채팅 시작 →</div>`;
    slot.appendChild(fc);
    stage.appendChild(slot);

    const COLS = 6, ROWS = 3;
    const grid = document.createElement('div');
    grid.className = 'grid';
    const stagger = 50, base = 200;
    for(let i = 0; i < COLS * ROWS; i++){
      const t = TEASERS[i % TEASERS.length];
      const row = Math.floor(i / COLS), col = i % COLS;
      const card = makeCard(t, { flipDelay: base + (row + col) * stagger });
      grid.appendChild(card);
    }
    stage.appendChild(grid);
    requestAnimationFrame(() => requestAnimationFrame(() => stage.classList.add('active')));

    const lastFlipEnd = base + ((COLS - 1) + (ROWS - 1)) * stagger + 800;
    setTimeout(() => stage.classList.add('featured-revealed'), lastFlipEnd + 250);
    return;
  }

  if(mode === 'decks-draw'){
    const inner = document.createElement('div');
    inner.className = 'stage-inner';

    const decks = document.createElement('div');
    decks.className = 'decks';

    const N_DECKS = 3, CARDS_PER_DECK = 5;
    const DECK_LABELS = ['DECK · I', 'DECK · II', 'DECK · III'];
    const FROM_X = [-280, 0, 280]; // each drawn card flies in from above its source deck
    const FROM_ROT = [-12, 4, 11];
    let cardIdx = 0;
    for(let d = 0; d < N_DECKS; d++){
      const deck = document.createElement('div');
      deck.className = 'deck';
      deck.dataset.label = DECK_LABELS[d];
      for(let i = 0; i < CARDS_PER_DECK; i++){
        const t = TEASERS[cardIdx++];
        const card = makeCard(t);
        card.style.setProperty('--i', i);
        // riffle propagates left deck → right deck, top card → bottom card
        const peekDelay = d * 320 + i * 75;
        card.style.setProperty('--peek-delay', peekDelay + 'ms');
        deck.appendChild(card);
      }
      decks.appendChild(deck);
    }
    inner.appendChild(decks);

    const drawnLabel = document.createElement('div');
    drawnLabel.className = 'drawn-label';
    drawnLabel.textContent = '★ 이번 주에 합류할 캐릭터 ★';
    inner.appendChild(drawnLabel);

    const drawnRow = document.createElement('div');
    drawnRow.className = 'drawn-row';
    // pick a representative card from each deck
    const pickIdx = [2, 7, 12]; // one from each deck
    pickIdx.forEach((src, i) => {
      const t = TEASERS[src];
      const card = makeCard(t);
      // each drawn card flies in from above its source deck position
      card.style.setProperty('--from-x', FROM_X[i] + 'px');
      card.style.setProperty('--from-rot', FROM_ROT[i] + 'deg');
      const drawDelay = 1850 + i * 220;
      card.style.setProperty('--draw-delay', drawDelay + 'ms');
      // flip mid-way through the fly-in
      card.style.setProperty('--flip-delay', (drawDelay + 380) + 'ms');
      drawnRow.appendChild(card);
    });
    inner.appendChild(drawnRow);

    stage.appendChild(inner);
    requestAnimationFrame(() => requestAnimationFrame(() => stage.classList.add('active')));
    // dim the deck after riffles end so the 3 drawn cards stand out
    setTimeout(() => stage.classList.add('dimmed'), 1750);
    return;
  }

  if(mode === 'tarot'){
    const inner = document.createElement('div');
    inner.className = 'stage-inner';
    const picks = [TEASERS[0], TEASERS[6], TEASERS[20]];
    picks.forEach((t, i) => {
      inner.appendChild(makeCard(t, { flipDelay: 700 + i * 1100 }));
    });
    stage.appendChild(inner);
    requestAnimationFrame(() => requestAnimationFrame(() => stage.classList.add('active')));
    return;
  }
}

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.mode);
  });
});
document.getElementById('replay').addEventListener('click', () => render(currentMode));

render('riffle');
</script>

</body>
</html>
