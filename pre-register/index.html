<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>LUCIVE</title>
<meta name="description" content="Beyond what you imagine — Character Chat. 당신의 상상, 그 너머의 캐릭터 챗.">
<meta name="robots" content="noindex">
<link rel="canonical" href="./v38-lp-wide.html">
<style>
html,body{margin:0;padding:0;background:#FFF9F7;color:#2A1A22;font-family:'Inter',-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center}
a{color:#C97B89;text-decoration:none;font-weight:700}
a:hover{text-decoration:underline}
.box{padding:32px 24px}
.brand{font-family:'JetBrains Mono',monospace;letter-spacing:.45em;font-weight:800;color:#C97B89;font-size:13px;margin-bottom:12px}
.msg{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;color:#6B5560}
.langs{margin-top:18px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;color:#9C8893}
.langs a{color:#9C8893;font-weight:700;margin:0 6px;text-decoration:none}
.langs a:hover{color:#C97B89}
</style>
</head>
<body>
<div class="box">
  <div class="brand">LUCIVE</div>
  <div class="msg">Loading… <a id="manualLink" href="./v38-lp-wide.html">Continue →</a></div>
  <div class="langs">
    <a href="./v38-lp-wide.html">한국어</a> ·
    <a href="./v38-lp-wide-en.html">English</a> ·
    <a href="./v38-lp-wide-ja.html">日本語</a> ·
    <a href="./v38-lp-wide-zh.html">中文</a>
  </div>
</div>
<script>
(function(){
  // 브라우저 언어 감지 → 해당 페이지로 자동 라우팅
  // URL ?lang=xx 가 있으면 우선
  var supported = { ko: 'v38-lp-wide.html', en: 'v38-lp-wide-en.html', ja: 'v38-lp-wide-ja.html', zh: 'v38-lp-wide-zh.html' };
  var fromUrl = new URLSearchParams(location.search).get('lang');
  var fromNav = (navigator.language || 'ko').toLowerCase().split('-')[0];
  var lang = (fromUrl && supported[fromUrl]) ? fromUrl : (supported[fromNav] ? fromNav : 'ko');
  var target = supported[lang];
  document.getElementById('manualLink').href = './' + target;
  // 즉시 리다이렉트 (단, 영어/일본어/중국어 페이지가 아직 없을 수 있어 fallback 처리)
  setTimeout(function(){ location.replace('./' + target); }, 50);
})();
</script>
</body>
</html>
